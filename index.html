<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f6f5f2;--card:#fff;--bdr:#e7e5e0;--t1:#1f1d1a;--t2:#7a766e;--t3:#b3aea4;
  --org:#ff7043;--obg:#fff0eb;--ot:#bf360c;
  --grn:#43a047;--gbg:#e8f5e9;--gt:#1b5e20;
  --amb:#fb8c00;--abg:#fff8e1;--at:#e65100;
  --blu:#1e88e5;--bbg:#e3f2fd;
  --gray:#efece7;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;padding-bottom:78px}
/* Header con marca siempre presente */
.hdr{background:var(--card);border-bottom:0.5px solid var(--bdr);padding:12px 16px 11px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:7px}
.brand-logo{font-size:20px}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.3px}
.brand-tag{font-size:11px;color:var(--t3);font-weight:500}
.scr-ttl{font-size:20px;font-weight:800;margin-top:8px;letter-spacing:-.4px}
.scr-sub{font-size:12px;color:var(--t2);margin-top:1px}
.search{margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--gray);border-radius:12px;padding:9px 12px}
.search input{flex:1;border:none;background:none;font-size:15px;color:var(--t1);outline:none}
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 16px 2px}
.chip{padding:6px 12px;border-radius:18px;font-size:13px;border:0.5px solid var(--bdr);background:var(--card);cursor:pointer;color:var(--t2);font-weight:500;white-space:nowrap}
.chip.on{background:var(--org);color:#fff;border-color:var(--org)}
.content{padding:8px 16px}
.intro{background:linear-gradient(135deg,#fff4ef,#ffe9e0);border:0.5px solid #ffd9c9;border-radius:16px;padding:14px 15px;margin:10px 0 4px;position:relative}
.intro h3{font-size:15px;color:var(--ot);margin-bottom:4px}
.intro p{font-size:13px;color:#8a5a45;line-height:1.5}
.intro .x{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.06);border:none;width:24px;height:24px;border-radius:50%;font-size:13px;cursor:pointer;color:var(--ot)}
.rcard{background:var(--card);border-radius:16px;border:0.5px solid var(--bdr);overflow:hidden;margin-bottom:10px;cursor:pointer;display:flex;align-items:stretch;position:relative}
.rcard-em{width:70px;background:var(--obg);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.rcard-time{position:absolute;top:9px;right:11px;font-size:17px;opacity:.9}
.rcard-bd{padding:11px 36px 11px 13px;flex:1;min-width:0}
.rcard-nm{font-size:16px;font-weight:700;padding-right:4px}
.rcard-nm .star{color:var(--amb);font-size:13px;margin-left:4px}
.rcard-meta{font-size:12px;color:var(--t2);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.dif{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px}
.dif1{background:var(--gbg);color:var(--gt)}.dif2{background:var(--abg);color:var(--at)}.dif3{background:var(--obg);color:var(--ot)}
.rcard-cost{font-size:15px;font-weight:700;color:var(--grn);margin-top:5px}
.rcard-cost small{font-size:11px;color:var(--t3);font-weight:500}
.empty{text-align:center;color:var(--t3);font-size:14px;padding:34px 20px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:0.5px solid var(--bdr);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:10px;position:relative}
.nb.on{color:var(--org)}
.ni{font-size:21px;line-height:1}
.nbdg{position:absolute;top:5px;right:calc(50% - 18px);background:var(--org);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--card)}
.fab{position:fixed;right:18px;bottom:88px;z-index:150;border:none;width:56px;height:56px;border-radius:50%;font-size:28px;cursor:pointer;color:#fff;background:var(--org);box-shadow:0 4px 16px rgba(255,112,67,.45);display:flex;align-items:center;justify-content:center}
.shdr{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 8px}
.sttl{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
/* Overlay PANTALLA COMPLETA con barra de volver fija */
.ov{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.ov.open{display:flex}
.topbar{background:var(--card);border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;padding:13px 10px;flex-shrink:0;position:relative}
.topbar .back{display:flex;align-items:center;gap:3px;background:none;border:none;color:var(--org);font-size:16px;font-weight:600;cursor:pointer;padding:4px 6px;z-index:2}
.topbar .wm{position:absolute;left:0;right:0;text-align:center;font-size:16px;font-weight:800;pointer-events:none}
.topbar .wm .lg{font-size:15px}
.ov-bd{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.det-hero{background:var(--obg);border-radius:16px;padding:18px;text-align:center;margin-bottom:14px;position:relative}
.det-time{position:absolute;top:12px;right:14px;font-size:24px}
.det-em{font-size:54px;line-height:1}
.det-nm{font-size:22px;font-weight:800;margin-top:4px}
.det-meta{font-size:13px;color:var(--ot);margin-top:7px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center}
.det-cost{display:flex;gap:10px;margin-bottom:14px}
.cost-box{flex:1;background:var(--card);border:0.5px solid var(--bdr);border-radius:14px;padding:12px;text-align:center}
.cost-box .l{font-size:11px;color:var(--t2)}
.cost-box .v{font-size:19px;font-weight:800;color:var(--grn);margin-top:2px}
.tipbox{background:var(--abg);border-radius:12px;padding:11px 13px;font-size:13px;color:var(--at);line-height:1.5;margin-bottom:12px;display:flex;gap:8px}
.bebida{background:var(--bbg);border-radius:12px;padding:11px 13px;font-size:13px;color:#0d47a1;margin-bottom:12px;display:flex;gap:8px;align-items:center}
.ing-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--bdr)}
.ing-row:last-child{border-bottom:none}
.ing-n{flex:1;font-size:14px;font-weight:500}
.ing-q{font-size:12px;color:var(--t2)}
.ing-c{font-size:13px;color:var(--t2);min-width:62px;text-align:right}
.step{display:flex;gap:10px;padding:9px 0;align-items:flex-start}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--org);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-t{font-size:14px;line-height:1.55;flex:1;padding-top:1px}
.var-row{padding:9px 0;border-bottom:0.5px solid var(--bdr);font-size:14px;line-height:1.5}
.var-row:last-child{border-bottom:none}
.var-row b{color:var(--ot)}
.card{background:var(--card);border:0.5px solid var(--bdr);border-radius:16px;padding:14px;margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin:10px 0 5px}
input[type=text],input[type=number],textarea,select{width:100%;border:0.5px solid var(--bdr);border-radius:10px;padding:11px;font-size:15px;color:var(--t1);background:var(--card);font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--org)}
textarea{resize:vertical;min-height:60px}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;background:var(--org);color:#fff;margin-top:8px}
.btn.sec{background:var(--gray);color:var(--t1)}
.btn.danger{background:var(--obg);color:var(--ot)}
.ing-edit{display:flex;gap:6px;margin-bottom:6px}
.ing-edit input{padding:8px}
.ing-edit .in-n{flex:2}.ing-edit .in-q{flex:1}.ing-edit .in-c{flex:1}
.ing-edit button{background:var(--obg);color:var(--ot);border:none;border-radius:8px;width:34px;flex-shrink:0;font-size:18px;cursor:pointer}
.addline{background:none;border:1px dashed var(--bdr);border-radius:10px;padding:9px;width:100%;color:var(--org);font-weight:600;cursor:pointer;font-size:13px;margin-top:4px}
.pantry-items{display:flex;flex-wrap:wrap;gap:7px}
.ping{padding:8px 13px;border-radius:18px;font-size:13px;border:0.5px solid var(--bdr);background:var(--card);cursor:pointer;color:var(--t2)}
.ping.on{background:var(--grn);color:#fff;border-color:var(--grn)}
.match-bar{height:6px;background:var(--gray);border-radius:3px;overflow:hidden;margin-top:6px}
.match-fill{height:6px;border-radius:3px}
.falta{font-size:11px;color:var(--at);margin-top:4px}
.cook-sum{background:var(--gbg);border-radius:14px;padding:13px 15px;font-size:14px;color:var(--gt);font-weight:600;margin-bottom:6px;text-align:center}
/* Mercado row arreglado: checkbox dentro de la tarjeta */
.mrow{background:var(--card);border:0.5px solid var(--bdr);border-radius:14px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:8px;cursor:pointer}
.mrow.sel{border-color:var(--org);background:var(--obg)}
.selbox{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:none;font-size:14px;color:#fff}
.mrow.sel .selbox{background:var(--org);border-color:var(--org)}
.mrow-em{font-size:24px;flex-shrink:0}
.mrow-bd{flex:1;min-width:0}
.mrow-nm{font-size:15px;font-weight:600}
.mrow-sub{font-size:12px;color:var(--t2);margin-top:1px}
.set-row{background:var(--card);border:0.5px solid var(--bdr);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:9px;cursor:pointer}
.set-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:var(--obg)}
.set-inf{flex:1;min-width:0}
.set-ttl{font-size:15px;font-weight:600}
.set-sub{font-size:12px;color:var(--t2);margin-top:1px}
.set-arr{color:var(--t3);font-size:20px}
.tip{background:var(--obg);color:var(--ot);border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.45;margin-bottom:10px}
.totbar{position:sticky;bottom:0;background:var(--card);border-top:0.5px solid var(--bdr);padding:13px 16px;display:flex;align-items:center;gap:12px;margin:8px -16px -8px;border-radius:14px 14px 0 0}
.totbar .tl{font-size:11px;color:var(--t2)}.totbar .tv{font-size:19px;font-weight:800;color:var(--grn)}
</style>
</head>
<body>
<div id="app"></div>

<nav class="bnav">
  <button class="nb" id="nav-recetas" onclick="goTo('recetas')"><span class="ni">🍲</span>Recetas</button>
  <button class="nb" id="nav-cocinar" onclick="goTo('cocinar')"><span class="ni">🧑‍🍳</span>Cocinar</button>
  <button class="nb" id="nav-mercado" onclick="goTo('mercado')"><span class="ni">🛒</span><span class="nbdg" id="bdg-m"></span>Mercado</button>

</nav>

<div class="ov" id="ov-det"><div class="topbar"><button class="back" onclick="closeOv('ov-det')">‹ Volver</button><div class="wm"><span class="lg">🍲</span> Olla</div></div><div class="ov-bd" id="det-body"></div></div>
<div class="ov" id="ov-edit"><div class="topbar"><button class="back" onclick="closeOv('ov-edit')">‹ Volver</button><div class="wm"><span class="lg">🍲</span> Olla</div></div><div class="ov-bd" id="edit-body"></div></div>
<div class="ov" id="ov-confirm" style="background:rgba(0,0,0,.45);justify-content:center"><div style="margin:auto;background:var(--bg);max-width:340px;width:90%;border-radius:18px;padding:20px;text-align:center"><div id="cf-t" style="font-size:17px;font-weight:700;margin-bottom:6px"></div><div id="cf-s" style="font-size:14px;color:var(--t2);margin-bottom:16px"></div><button class="btn danger" id="cf-ok">Confirmar</button><button class="btn sec" onclick="closeOv('ov-confirm')">Cancelar</button></div></div>

<script>
const PFX='olla_';
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmt(n){return '$'+Math.round(n||0).toLocaleString('es-CO');}

// ── Categorías (por momento del día) ──────────────────────
const CATS=[
  {k:'Desayuno',i:'🍳',time:'🌅'},
  {k:'Almuerzo',i:'🍲',time:'☀️'},
  {k:'Onces',i:'☕',time:'🌤️'},
  {k:'Cena',i:'🌙',time:'🌙'},
  {k:'Postre',i:'🍮',time:'🍰'}
];
function catObj(k){return CATS.find(x=>x.k===k)||{k,i:'🍴',time:''};}
function catIco(k){return catObj(k).i;}
function timeIco(k){return catObj(k).time;}
const DIF=['','Fácil','Medio','Avanzado'];

// ── Recetas precargadas (estructuradas, con tips y bebida) ─
const DEFAULT_RECIPES=[
 // ── DESAYUNOS (de más elaborado a más simple) ──
 {id:'r_rancheros',emoji:'🍳',name:'Huevos rancheros',cat:'Desayuno',serv:2,min:25,dif:3,fav:false,bebida:'Café con leche',
  ing:[{n:'Huevos',q:'2',c:1000},{n:'Arepa o tortilla',q:'2',c:1500},{n:'Tomate',q:'2',c:1000},{n:'Cebolla',q:'1/2',c:300},{n:'Fríjoles refritos',q:'1/2 taza',c:1000},{n:'Aceite',q:'1 cda',c:200},{n:'Sal',q:'al gusto',c:50}],
  steps:['Pica el tomate y la cebolla bien finos.','En aceite a fuego MEDIO sofríe la cebolla 2 min (sin dorar de más), agrega el tomate y cocina 5 min hasta una salsa.','Aparte fríe los huevos a fuego medio dejando la yema blanda.','Calienta la arepa, ponle los fríjoles, encima el huevo y báñalo con la salsa.'],
  tip:'Fuego MEDIO siempre: si la cebolla se quema amarga toda la salsa. Sazona la salsa al final con sal.'},
 {id:'r_changua',emoji:'🥣',name:'Changua',cat:'Desayuno',serv:2,min:15,dif:2,fav:false,bebida:'Chocolate caliente',
  ing:[{n:'Leche',q:'2 tazas',c:1500},{n:'Agua',q:'1 taza',c:0},{n:'Huevos',q:'2',c:1000},{n:'Cebolla larga',q:'1 rama',c:300},{n:'Cilantro',q:'al gusto',c:300},{n:'Pan o calado',q:'2 trozos',c:800},{n:'Sal',q:'al gusto',c:50}],
  steps:['Hierve la leche con el agua, la cebolla picada y sal a fuego medio.','Cuando hierva, baja el fuego y casca los huevos enteros dentro; cocina 3 min sin revolver.','Sirve sobre el pan en el plato y agrega cilantro fresco.'],
  tip:'No dejes hervir fuerte la leche o se rebosa. El huevo queda perfecto cuando la clara está firme y la yema aún blanda.'},
 {id:'r_caldo',emoji:'🍲',name:'Caldo de costilla',cat:'Desayuno',serv:3,min:35,dif:2,fav:false,bebida:'Chocolate',
  ing:[{n:'Costilla de res',q:'300 g',c:5000},{n:'Papa',q:'3',c:1000},{n:'Cebolla larga',q:'1 rama',c:300},{n:'Cilantro',q:'al gusto',c:300},{n:'Sal',q:'al gusto',c:50}],
  steps:['En una olla con 6 tazas de agua cocina la costilla con cebolla y sal 20 min, retirando la espuma de arriba.','Agrega la papa pelada y partida; cocina 15 min más hasta que ablande.','Sirve con cilantro fresco encima.'],
  tip:'Retirar la espuma deja el caldo limpio y de mejor sabor. Prueba la sal antes de servir.'},
 {id:'r_revtocino',emoji:'🥓',name:'Huevos revueltos con tocino',cat:'Desayuno',serv:2,min:15,dif:2,fav:false,bebida:'Jugo de naranja',
  ing:[{n:'Huevos',q:'3',c:1500},{n:'Tocino',q:'4 lonjas',c:3000},{n:'Sal',q:'al gusto',c:50}],
  steps:['Dora el tocino en sartén SIN aceite a fuego medio hasta crocante; resérvalo.','En la misma grasa baja el fuego y agrega los huevos batidos con sal.','Revuelve lento 1-2 min hasta cuajar suave; mezcla el tocino partido.'],
  tip:'Apaga el fuego un poco antes: el huevo se sigue cocinando con el calor y queda cremoso, no seco.'},
 {id:'r_waffles',emoji:'🧇',name:'Waffles',cat:'Desayuno',serv:3,min:20,dif:2,fav:false,bebida:'Chocolisto',
  ing:[{n:'Harina',q:'1 taza',c:800},{n:'Huevo',q:'1',c:500},{n:'Leche',q:'1 taza',c:750},{n:'Azúcar',q:'2 cdas',c:200},{n:'Polvo de hornear',q:'1 cdta',c:200},{n:'Mantequilla',q:'2 cdas',c:600}],
  steps:['Mezcla harina, azúcar y polvo de hornear.','Aparte bate huevo, leche y mantequilla derretida; une con lo seco sin batir de más.','Vierte en la wafflera caliente y engrasada; cocina 3-4 min hasta dorar.'],
  tip:'No batas mucho la mezcla o quedan duros. Necesitas wafflera; sin ella, usa la misma masa para pancakes.'},
 {id:'r_pericos',emoji:'🍳',name:'Huevos pericos',cat:'Desayuno',serv:2,min:10,dif:1,fav:false,bebida:'Chocolate',
  ing:[{n:'Huevos',q:'3',c:1500},{n:'Tomate',q:'1',c:500},{n:'Cebolla larga',q:'1 rama',c:300},{n:'Aceite',q:'1 cda',c:200},{n:'Sal',q:'al gusto',c:50}],
  steps:['Pica fino tomate y cebolla.','Sofríe en aceite a fuego medio 3 min.','Agrega los huevos batidos con sal y revuelve hasta cuajar suave.'],
  tip:'Fuego medio: a fuego alto el huevo se seca y se pega. Sirve apenas cuaje.'},
 {id:'r_revueltos',emoji:'🍳',name:'Huevos revueltos',cat:'Desayuno',serv:1,min:8,dif:1,fav:false,bebida:'Avena caliente',
  ing:[{n:'Huevos',q:'2',c:1000},{n:'Aceite o mantequilla',q:'1 cdta',c:150},{n:'Sal',q:'al gusto',c:50}],
  steps:['Bate los huevos con sal.','Calienta la sartén a fuego medio-bajo con un poquito de grasa.','Agrega y revuelve suave 1-2 min hasta cuajar cremoso.'],
  tip:'Fuego bajo y movimiento constante = huevos cremosos. Retira antes de que se vean totalmente secos.'},

 // ── ALMUERZOS ──
 {id:'r_arroz',emoji:'🍚',name:'Arroz',cat:'Almuerzo',serv:4,min:20,dif:1,fav:false,
  ing:[{n:'Arroz',q:'2 tazas',c:1600},{n:'Agua',q:'4 tazas',c:0},{n:'Aceite',q:'1 cda',c:200},{n:'Sal',q:'1 cdta',c:50}],
  steps:['Sofríe el arroz en el aceite con la sal 1 min revolviendo.','Agrega el agua CALIENTE (4 tazas por 2 de arroz).','Cuando seque la superficie, tapa y cocina a fuego BAJO 15 min. No destapes antes.'],
  tip:'La regla es doble agua que arroz. Si destapas antes de tiempo queda crudo o se pega.',
  variaciones:['Con zanahoria: sofríe 1 zanahoria rallada junto con el arroz antes del agua.','Con fideos: dora 1/4 taza de fideos en el aceite hasta marrón, luego agrega el arroz.','Con cilantro y cebolla: añade cebolla picada al sofrito y cilantro al final.']},
 {id:'r_pasta',emoji:'🍝',name:'Pasta',cat:'Almuerzo',serv:4,min:25,dif:2,fav:false,

// ── Storage ───────────────────────────────────────────────
function gR(){const r=localStorage.getItem(PFX+'recipes');return r?JSON.parse(r):DEFAULT_RECIPES.map(cloneR);}
function cloneR(x){return {...x,ing:(x.ing||[]).map(i=>({...i})),steps:[...(x.steps||[])],variaciones:x.variaciones?[...x.variaciones]:undefined};}
function sR(arr){localStorage.setItem(PFX+'recipes',JSON.stringify(arr));autoSync();}
function gPantry(){const r=localStorage.getItem(PFX+'pantry');return r?JSON.parse(r):[];}
function sPantry(a){localStorage.setItem(PFX+'pantry',JSON.stringify(a));autoSync();}

function recipeCost(r){return (r.ing||[]).reduce((s,i)=>s+(+i.c||0),0);}
function recipeCostServ(r){const c=recipeCost(r);return r.serv>0?c/r.serv:c;}

// ── Estado ────────────────────────────────────────────────
let curScreen='recetas',filterCat='',filterFav=false,searchTxt='',selRecipes=new Set(),editId=null,editIngs=[];

function goTo(s){curScreen=s;renderAll();}
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
let _ccb=null;
function showConfirm(t,s,cb){document.getElementById('cf-t').textContent=t;document.getElementById('cf-s').textContent=s;_ccb=cb;document.getElementById('cf-ok').onclick=()=>{closeOv('ov-confirm');if(_ccb)_ccb();};openOv('ov-confirm');}

function brandHdr(){return `<div class="brand"><span class="brand-logo">🍲</span><span class="brand-name">Olla</span><span class="brand-tag">· recetas simples</span></div>`;}

function renderAll(){
  ['recetas','cocinar','mercado','mas'].forEach(s=>{const el=document.getElementById('nav-'+s);if(el)el.classList.toggle('on',curScreen===s);});
  const m=document.getElementById('bdg-m');if(m){m.textContent=selRecipes.size;m.style.display=selRecipes.size>0?'flex':'none';}
  const app=document.getElementById('app');
  const f=document.getElementById('fab');if(f)f.remove();
  if(curScreen==='recetas')rRecetas(app);
  else if(curScreen==='cocinar')rCocinar(app);
  else if(curScreen==='mercado')rMercado(app);
  else rMas(app);
}

// ── RECETAS ───────────────────────────────────────────────
function rRecetas(app){
  const recipes=gR();
  const intro=localStorage.getItem(PFX+'introHidden')?'':`<div class="intro"><button class="x" onclick="localStorage.setItem('${PFX}introHidden','1');renderAll()">✕</button><h3>🍲 Tu recetario casero</h3><p>Comida simple y económica para el día a día. Mira cuánto cuesta cada receta, arma tu mercado y descubre qué cocinar con lo que ya tienes. Toca + para agregar las tuyas.</p></div>`;
  const chips=`<div class="chips"><button class="chip ${!filterCat&&!filterFav?'on':''}" onclick="filterCat='';filterFav=false;renderAll()">Todas</button><button class="chip ${filterFav?'on':''}" onclick="filterFav=!filterFav;renderAll()">⭐ Favoritas</button>`+
    CATS.map(c=>`<button class="chip ${filterCat===c.k?'on':''}" onclick="filterCat=filterCat==='${c.k}'?'':'${c.k}';filterFav=false;renderAll()">${c.time} ${c.k}</button>`).join('')+`</div>`;
  app.innerHTML=`<div class="hdr">${brandHdr()}<div class="search">🔎<input type="text" id="srch" placeholder="Buscar receta o ingrediente..." value="${esc(searchTxt)}"></div></div>${chips}<div class="content">${intro}<div id="cards"></div></div>`;
  renderCards();
  const fab=document.createElement('button');fab.className='fab';fab.id='fab';fab.textContent='＋';fab.onclick=()=>openEdit(null);document.body.appendChild(fab);
  const si=document.getElementById('srch');si.addEventListener('input',e=>{searchTxt=e.target.value;renderCards();});
}
function filteredRecipes(){
  const q=searchTxt.trim().toLowerCase();
  return gR().filter(r=>{
    if(filterCat&&r.cat!==filterCat)return false;
    if(filterFav&&!r.fav)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!(r.ing||[]).some(i=>i.n.toLowerCase().includes(q)))return false;
    return true;
  });
}
function cardHtml(r){
  const cs=recipeCostServ(r);
  return `<div class="rcard" onclick="openDetail('${r.id}')"><div class="rcard-em">${r.emoji||'🍴'}</div><span class="rcard-time">${timeIco(r.cat)}</span><div class="rcard-bd"><div class="rcard-nm">${esc(r.name)}${r.fav?'<span class="star">★</span>':''}</div><div class="rcard-meta"><span>${esc(r.cat)}</span><span>⏱ ${r.min} min</span>${r.dif?`<span class="dif dif${r.dif}">${DIF[r.dif]}</span>`:''}</div><div class="rcard-cost">${fmt(cs)} <small>/ porción · ${fmt(recipeCost(r))} total</small></div></div></div>`;
}
function renderCards(){
  const el=document.getElementById('cards');if(!el)return;
  const list=filteredRecipes();
  el.innerHTML=list.length?list.map(cardHtml).join(''):`<div class="empty">No hay recetas que coincidan.<br>Usa el botón + para crear una.</div>`;
}

// ── DETALLE ───────────────────────────────────────────────

  const ings=(r.ing||[]).map(i=>`<div class="ing-row"><span class="ing-n">${esc(i.n)}</span><span class="ing-q">${esc(i.q)}</span><span class="ing-c">${i.c?fmt(i.c):'—'}</span></div>`).join('');
  const steps=(r.steps||[]).map((s,idx)=>`<div class="step"><div class="step-n">${idx+1}</div><div class="step-t">${esc(s)}</div></div>`).join('');
  const vars=(r.variaciones&&r.variaciones.length)?`<div class="shdr"><span class="sttl">Variaciones</span></div><div class="card">${r.variaciones.map(v=>{const p=v.split(':');return `<div class="var-row"><b>${esc(p[0])}</b>${p.length>1?': '+esc(p.slice(1).join(':').trim()):''}</div>`;}).join('')}</div>`:'';
  const beb=r.bebida?`<div class="bebida">🥤 <span><b>Bebida sugerida:</b> ${esc(r.bebida)}</span></div>`:'';
  const tip=r.tip?`<div class="tipbox">💡 <span>${esc(r.tip)}</span></div>`:'';
  document.getElementById('det-body').innerHTML=`
    <div class="det-hero"><span class="det-time">${timeIco(r.cat)}</span><div class="det-em">${r.emoji||'🍴'}</div><div class="det-nm">${esc(r.name)}</div>
      <div class="det-meta"><span>${catIco(r.cat)} ${esc(r.cat)}</span><span>⏱ ${r.min} min</span><span>🍽 ${r.serv} porc.</span>${r.dif?`<span class="dif dif${r.dif}">${DIF[r.dif]}</span>`:''}</div></div>
    <div class="det-cost"><div class="cost-box"><div class="l">Costo total</div><div class="v">${fmt(recipeCost(r))}</div></div><div class="cost-box"><div class="l">Por porción</div><div class="v">${fmt(recipeCostServ(r))}</div></div></div>
    ${beb}
    <button class="btn ${r.fav?'':'sec'}" onclick="toggleFav('${r.id}')">${r.fav?'★ Quitar de favoritas':'☆ Marcar favorita'}</button>
    <div class="shdr"><span class="sttl">Ingredientes</span></div><div class="card" style="padding:6px 14px">${ings||'<div class="ing-row">Sin ingredientes</div>'}</div>
    <div class="shdr"><span class="sttl">Preparación</span></div><div class="card">${steps||'Sin pasos'}</div>
    ${tip}
    ${vars}
    <button class="btn sec" onclick="openEdit('${r.id}')">✏️ Editar</button>
    <button class="btn danger" onclick="delRecipe('${r.id}')">🗑 Eliminar</button>
    <div style="height:8px"></div>`;
  openOv('ov-det');
  document.getElementById('det-body').scrollTop=0;
}
function toggleFav(id){const a=gR();const r=a.find(x=>x.id===id);if(r){r.fav=!r.fav;sR(a);openDetail(id);}}
function delRecipe(id){const r=gR().find(x=>x.id===id);showConfirm('¿Eliminar receta?','Se borrará "'+(r?r.name:'')+'".',()=>{sR(gR().filter(x=>x.id!==id));selRecipes.delete(id);closeOv('ov-det');renderAll();});}

// ── CREAR / EDITAR ────────────────────────────────────────
function openEdit(id){
  editId=id;
  const r=id?gR().find(x=>x.id===id):null;
  editIngs=r?r.ing.map(i=>({...i})):[{n:'',q:'',c:''}];
  const catOpts=CATS.map(c=>`<option value="${c.k}" ${r&&r.cat===c.k?'selected':''}>${c.time} ${c.k}</option>`).join('');
  const difOpts=[1,2,3].map(d=>`<option value="${d}" ${r&&r.dif===d?'selected':''}>${DIF[d]}</option>`).join('');
  document.getElementById('edit-body').innerHTML=`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:6px">${id?'Editar receta':'Nueva receta'}</h2>
    <label>Emoji</label><input type="text" id="e-emoji" maxlength="2" value="${r?esc(r.emoji):'🍴'}" style="width:70px;text-align:center;font-size:22px">
    <label>Nombre</label><input type="text" id="e-name" placeholder="Ej: Arroz con pollo" value="${r?esc(r.name):''}">
    <div style="display:flex;gap:10px"><div style="flex:2"><label>Categoría</label><select id="e-cat">${catOpts}</select></div><div style="flex:1"><label>Dificultad</label><select id="e-dif">${difOpts}</select></div></div>
    <div style="display:flex;gap:10px"><div style="flex:1"><label>Porciones</label><input type="number" id="e-serv" inputmode="numeric" value="${r?r.serv:2}"></div><div style="flex:1"><label>Minutos</label><input type="number" id="e-min" inputmode="numeric" value="${r?r.min:15}"></div></div>
    <label>Bebida sugerida (opcional)</label><input type="text" id="e-beb" placeholder="Ej: Chocolate caliente" value="${r&&r.bebida?esc(r.bebida):''}">
    <label>Ingredientes <span style="font-weight:400;color:var(--t3)">(nombre · cantidad · $)</span></label>
    <div id="ing-list"></div>
    <button class="addline" onclick="addIngLine()">+ Agregar ingrediente</button>
    <label style="margin-top:14px">Preparación (un paso por línea)</label>
    <textarea id="e-steps" rows="6" placeholder="Pica la cebolla...">${r?esc((r.steps||[]).join('\n')):''}</textarea>
    <label>Tip (opcional)</label><textarea id="e-tip" rows="2" placeholder="Truco para que quede bien...">${r&&r.tip?esc(r.tip):''}</textarea>
    <button class="btn" onclick="saveRecipe()">💾 Guardar receta</button><div style="height:8px"></div>`;
  renderIngEdit();
  openOv('ov-edit');
  document.getElementById('edit-body').scrollTop=0;
}
function renderIngEdit(){
  const el=document.getElementById('ing-list');if(!el)return;
  el.innerHTML=editIngs.map((i,idx)=>`<div class="ing-edit"><input class="in-n" type="text" placeholder="Ingrediente" value="${esc(i.n)}" oninput="editIngs[${idx}].n=this.value"><input class="in-q" type="text" placeholder="Cant." value="${esc(i.q)}" oninput="editIngs[${idx}].q=this.value"><input class="in-c" type="number" inputmode="numeric" placeholder="$" value="${i.c===''?'':esc(i.c)}" oninput="editIngs[${idx}].c=this.value"><button onclick="delIngLine(${idx})">×</button></div>`).join('');
}
function addIngLine(){editIngs.push({n:'',q:'',c:''});renderIngEdit();}
function delIngLine(idx){editIngs.splice(idx,1);if(!editIngs.length)editIngs.push({n:'',q:'',c:''});renderIngEdit();}
function saveRecipe(){
  const name=document.getElementById('e-name').value.trim();
  if(!name){alert('Ponle un nombre a la receta.');return;}
  const beb=document.getElementById('e-beb').value.trim();
  const tip=document.getElementById('e-tip').value.trim();
  const rec={
    id:editId||('u_'+Date.now()),
    emoji:document.getElementById('e-emoji').value.trim()||'🍴',
    name,cat:document.getElementById('e-cat').value,
    dif:parseInt(document.getElementById('e-dif').value)||1,
    serv:parseInt(document.getElementById('e-serv').value)||1,
    min:parseInt(document.getElementById('e-min').value)||0,
    ing:editIngs.filter(i=>i.n.trim()).map(i=>({n:i.n.trim(),q:(i.q||'').trim(),c:parseInt(i.c)||0})),
    steps:document.getElementById('e-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    fav:false
  };
  if(beb)rec.bebida=beb;
  if(tip)rec.tip=tip;
  const a=gR();const ex=a.findIndex(x=>x.id===rec.id);
  if(ex>=0){rec.fav=a[ex].fav;if(a[ex].variaciones)rec.variaciones=a[ex].variaciones;a[ex]=rec;}else a.unshift(rec);
  sR(a);closeOv('ov-edit');closeOv('ov-det');renderAll();
}

// ── COCINAR ───────────────────────────────────────────────
function allIngredientNames(){const set=new Set();gR().forEach(r=>(r.ing||[]).forEach(i=>{if(i.n.trim())set.add(i.n.trim());}));return [...set].sort((a,b)=>a.localeCompare(b,'es'));}
function rCocinar(app){
  const pantry=gPantry();const pset=new Set(pantry.map(x=>x.toLowerCase()));
  const names=allIngredientNames();
  const pills=names.map(n=>`<button class="ping ${pset.has(n.toLowerCase())?'on':''}" onclick="togglePantry('${esc(n).replace(/'/g,"\\'")}')">${esc(n)}</button>`).join('');
  const matches=gR().map(r=>{const ing=(r.ing||[]).map(i=>i.n.toLowerCase());const have=ing.filter(n=>pset.has(n));const falta=(r.ing||[]).filter(i=>!pset.has(i.n.toLowerCase())).map(i=>i.n);return {r,pct:ing.length?Math.round(have.length/ing.length*100):0,falta};}).filter(m=>m.pct>0).sort((a,b)=>b.pct-a.pct);
  const full=matches.filter(m=>m.pct===100);
  const almost=matches.filter(m=>m.pct>=50&&m.pct<100);
  function mCard(m){const col=m.pct===100?'var(--grn)':'var(--amb)';return `<div class="rcard" onclick="openDetail('${m.r.id}')"><div class="rcard-em">${m.r.emoji}</div><span class="rcard-time">${timeIco(m.r.cat)}</span><div class="rcard-bd"><div class="rcard-nm">${esc(m.r.name)}</div><div class="match-bar"><div class="match-fill" style="width:${m.pct}%;background:${col}"></div></div><div class="rcard-meta" style="margin-top:5px"><span style="color:${col};font-weight:600">${m.pct===100?'✅ Puedes hacerla ya':m.pct+'% — te falta poco'}</span></div>${m.falta.length&&m.pct<100?`<div class="falta">Te falta: ${esc(m.falta.slice(0,4).join(', '))}${m.falta.length>4?'…':''}</div>`:''}</div></div>`;}
  let body;
  if(!pantry.length){body=`<div class="tip">👆 Marca arriba los ingredientes que tienes en casa y te muestro qué puedes cocinar ya mismo y a qué recetas les falta poco.</div>`;}
  else{
    body=`<div class="cook-sum">🎉 Puedes preparar <b>${full.length}</b> receta${full.length===1?'':'s'} completa${full.length===1?'':'s'} y te falta poco para <b>${almost.length}</b> más.</div>`;
    if(full.length){body+=`<div class="shdr"><span class="sttl">✅ Puedes hacer ya</span></div>`+full.map(mCard).join('');}
    if(almost.length){body+=`<div class="shdr"><span class="sttl">🟡 Te falta poco</span></div>`+almost.map(mCard).join('');}
    if(!full.length&&!almost.length){body+=`<div class="empty">Nada coincide aún. Marca más ingredientes.</div>`;}
  }
  app.innerHTML=`<div class="hdr">${brandHdr()}<div class="scr-ttl">🧑‍🍳 ¿Qué cocino?</div><div class="scr-sub">${pantry.length} ingredientes marcados en tu cocina</div></div>
    <div class="content"><div class="shdr"><span class="sttl">Lo que tengo en casa</span>${pantry.length?'<button class="chip" onclick="clearPantry()">Limpiar</button>':''}</div><div class="pantry-items">${pills||'<div class="empty">Aún no hay ingredientes.</div>'}</div>
    <div class="shdr"><span class="sttl">Resultados</span></div>${body}</div>`;
}
function togglePantry(n){const a=gPantry();const i=a.findIndex(x=>x.toLowerCase()===n.toLowerCase());if(i>=0)a.splice(i,1);else a.push(n);sPantry(a);renderAll();}
function clearPantry(){showConfirm('¿Limpiar cocina?','Se desmarcan todos los ingredientes.',()=>{sPantry([]);renderAll();});}

// ── MERCADO ───────────────────────────────────────────────
function rMercado(app){
  const recipes=gR();
  const rows=recipes.map(r=>{const on=selRecipes.has(r.id);return `<div class="mrow ${on?'sel':''}" onclick="toggleSel('${r.id}')"><div class="selbox">${on?'✓':''}</div><div class="mrow-em">${r.emoji}</div><div class="mrow-bd"><div class="mrow-nm">${esc(r.name)}</div><div class="mrow-sub">${timeIco(r.cat)} ${esc(r.cat)} · ${fmt(recipeCost(r))} · ${r.serv} porc.</div></div></div>`;}).join('');
  let listHtml='',total=0;
  if(selRecipes.size){
    const agg={};
    recipes.filter(r=>selRecipes.has(r.id)).forEach(r=>(r.ing||[]).forEach(i=>{const k=i.n.toLowerCase();if(!agg[k])agg[k]={n:i.n,qs:[],c:0};if(i.q)agg[k].qs.push(i.q);agg[k].c+=(+i.c||0);total+=(+i.c||0);}));
    const items=Object.values(agg).sort((a,b)=>a.n.localeCompare(b.n,'es'));
    listHtml=`<div class="shdr"><span class="sttl">🛒 Tu lista (${items.length} ingredientes)</span></div><div class="card" style="padding:6px 14px">`+items.map(it=>`<div class="ing-row"><span class="ing-n">${esc(it.n)}</span><span class="ing-q">${esc(it.qs.join(' + '))}</span><span class="ing-c">${it.c?fmt(it.c):'—'}</span></div>`).join('')+`</div>`;
  }
  app.innerHTML=`<div class="hdr">${brandHdr()}<div class="scr-ttl">🛒 Mercado</div><div class="scr-sub">Elige recetas y arma tu lista de compras</div></div>
    <div class="content">${listHtml}<div class="shdr"><span class="sttl">Elegir recetas</span>${selRecipes.size?'<button class="chip" onclick="clearSel()">Limpiar</button>':''}</div>${rows}
    ${selRecipes.size?`<div class="totbar"><div style="flex:1"><div class="tl">Costo estimado total (${selRecipes.size} recetas)</div><div class="tv">${fmt(total)}</div></div></div>`:''}</div>`;
}
function toggleSel(id){if(selRecipes.has(id))selRecipes.delete(id);else selRecipes.add(id);renderAll();}
function clearSel(){selRecipes.clear();renderAll();}

// ── MÁS ───────────────────────────────────────────────────
function rMas(app){
  const driveId=getDriveClientId();const driveOk=isDriveConnected();
  app.innerHTML=`<div class="hdr">${brandHdr()}<div class="scr-ttl">⚙️ Más</div><div class="scr-sub">Respaldo y datos</div></div>
  <div class="content">
    <div class="tip">🍲 <b>Olla</b> es tu recetario de comida casera, simple y económica: recetas precargadas, costos por porción, lista de mercado y "qué cocino con lo que tengo".</div>
    <div class="shdr"><span class="sttl">Respaldo</span></div>
    <div class="set-row" onclick="exportJSON()"><div class="set-ico">📦</div><div class="set-inf"><div class="set-ttl">Exportar respaldo</div><div class="set-sub">Descarga tus recetas en un archivo JSON.</div></div><span class="set-arr">↓</span></div>
    <div class="set-row" onclick="document.getElementById('imp-file').click()"><div class="set-ico">📥</div><div class="set-inf"><div class="set-ttl">Importar respaldo</div><div class="set-sub">Restaura desde un archivo JSON.</div></div><span class="set-arr">›</span></div>
    <input type="file" id="imp-file" accept="application/json" style="display:none" onchange="importFile(event)">
    <div class="shdr"><span class="sttl">Google Drive</span></div>
    <div class="set-row" onclick="${driveId?'authDrive()':'connectDrivePrompt()'}"><div class="set-ico" style="background:${driveOk?'var(--gbg)':'var(--gray)'}">${driveOk?'✅':'☁️'}</div><div class="set-inf"><div class="set-ttl">${driveId?'Drive configurado':'Conectar Google Drive'}</div><div class="set-sub">${driveId?'Toca para re-autorizar (token 1h).':'Respaldo automático en tu nube.'}</div></div><span class="set-arr">›</span></div>
    ${driveId?`<div class="set-row" onclick="syncNow()"><div class="set-ico">🔄</div><div class="set-inf"><div class="set-ttl">Sincronizar ahora</div></div><span class="set-arr">›</span></div><div class="set-row" onclick="restoreFromDrive()"><div class="set-ico">⬇️</div><div class="set-inf"><div class="set-ttl">Restaurar desde Drive</div><div class="set-sub">Trae tu último respaldo.</div></div><span class="set-arr">›</span></div>`:''}
    <div class="shdr"><span class="sttl">Recetas</span></div>
    <div class="set-row" onclick="resetRecipes()"><div class="set-ico">↺</div><div class="set-inf"><div class="set-ttl">Restaurar recetas de ejemplo</div><div class="set-sub">Recarga el recetario inicial. Tus recetas creadas (con +) se conservan.</div></div><span class="set-arr">›</span></div>
    <div class="shdr"><span class="sttl">Info</span></div>
    <div class="set-row" style="cursor:default"><div class="set-ico">🍲</div><div class="set-inf"><div class="set-ttl">Olla v2</div><div class="set-sub">Recetas simples y económicas. Datos en tu dispositivo.</div><div class="set-sub" style="margin-top:3px">Hecho por <b>Mauricio Vergara</b> · Bogotá–COL</div></div></div>
    <div class="set-row" onclick="window.open('https://github.com/omvergara/olla/issues','_blank')"><div class="set-ico">💬</div><div class="set-inf"><div class="set-ttl">Reportar un problema</div><div class="set-sub">Issues del repo en GitHub.</div></div><span class="set-arr">›</span></div>
  </div>`;
}
function resetRecipes(){showConfirm('¿Restaurar recetas de ejemplo?','Se vuelven a agregar las recetas iniciales. Tus recetas creadas se conservan.',()=>{const mine=gR().filter(r=>r.id.startsWith('u_'));sR([...mine,...DEFAULT_RECIPES.map(cloneR)]);renderAll();alert('✅ Recetas de ejemplo restauradas.');});}

// ── Backup ────────────────────────────────────────────────
function getAllData(){const all={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(PFX))all[k]=localStorage.getItem(k);}return all;}
function applyBackupObject(obj){if(!obj||typeof obj!=='object')return 0;let n=0;Object.keys(obj).forEach(k=>{if(k.startsWith(PFX)){const v=obj[k];localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));n++;}});return n;}
function exportJSON(){const blob=new Blob([JSON.stringify(getAllData(),null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='olla_respaldo.json';a.click();URL.revokeObjectURL(url);}
function importFile(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const n=applyBackupObject(JSON.parse(ev.target.result));if(!n){alert('El archivo no tiene datos de Olla.');return;}alert('✅ Restaurados '+n+' datos. La app se recargará.');location.reload();}catch(err){alert('JSON inválido.');}};rd.readAsText(f);}

// ── Google Drive ──────────────────────────────────────────
let driveToken=null,driveFileId=localStorage.getItem(PFX+'drive_fid')||null,tokenClient=null;
function getDriveClientId(){return localStorage.getItem(PFX+'drive_cid')||'';}
function isDriveConnected(){return !!driveToken;}
function connectDrivePrompt(){const cid=prompt('Pega tu Client ID de Google OAuth:');if(cid&&cid.trim()){localStorage.setItem(PFX+'drive_cid',cid.trim());authDrive();}}
function authDrive(){const cid=getDriveClientId();if(!cid)return;if(!window.google||!google.accounts){alert('Librería de Google cargando, espera 2s.');return;}tokenClient=google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/drive.file',callback:(resp)=>{if(resp.access_token){driveToken=resp.access_token;autoSync();renderAll();alert('✅ Drive conectado.');}}});tokenClient.requestAccessToken();}
async function autoSync(){if(!driveToken)return;const payload=JSON.stringify(getAllData());try{if(driveFileId){await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},body:payload});}else{const meta=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},body:JSON.stringify({name:'olla_backup.json',mimeType:'application/json'})}).then(r=>r.json());if(meta.id){driveFileId=meta.id;localStorage.setItem(PFX+'drive_fid',meta.id);await fetch(`https://www.googleapis.com/upload/drive/v3/files/${meta.id}?uploadType=media`,{method:'PATCH',headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},body:payload});}}}catch(e){console.log('sync err',e);}}
async function syncNow(){if(!driveToken){authDrive();return;}await autoSync();alert('✅ Sincronizado.');}
function startDriveRestore(){const cid=getDriveClientId();if(!cid){alert('Conecta Google Drive primero.');return;}if(!window.google||!google.accounts){alert('Librería de Google cargando, espera 2s.');return;}const tc=google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/drive.file',callback:(resp)=>{if(resp.access_token){driveToken=resp.access_token;doRestoreFromDrive();}}});tc.requestAccessToken();}
async function doRestoreFromDrive(){try{let fid=driveFileId;if(!fid){const q=encodeURIComponent("name='olla_backup.json' and trashed=false");const list=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=${encodeURIComponent('files(id,modifiedTime)')}&orderBy=${encodeURIComponent('modifiedTime desc')}`,{headers:{'Authorization':'Bearer '+driveToken}}).then(r=>r.json());if(list.files&&list.files.length){fid=list.files[0].id;driveFileId=fid;localStorage.setItem(PFX+'drive_fid',fid);}}if(!fid){alert('No se encontró respaldo en tu Drive.');return;}const content=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{'Authorization':'Bearer '+driveToken}}).then(r=>r.json());const n=applyBackupObject(content);if(!n){alert('El respaldo está vacío.');return;}alert('✅ Restaurados '+n+' datos. La app se recargará.');location.reload();}catch(e){alert('Error al restaurar. Revisa tu conexión.');console.log('restore err',e);}}
function restoreFromDrive(){if(!getDriveClientId()){alert('Conecta Google Drive primero.');return;}showConfirm('¿Restaurar desde Drive?','Se reemplazan tus datos con el último respaldo en la nube.',startDriveRestore);}

renderAll();
</script>
